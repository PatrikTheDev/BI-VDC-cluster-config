vrrp_script chk_haproxy {
    script "killall -0 haproxy"
    interval 2
    weight 2
}

vrrp_instance VI_1 {
    interface ens192
    state MASTER            # BACKUP on node2, node3
    virtual_router_id 51
    priority 150            # 140 on node2, 130 on node3
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass supersecret
    }
    virtual_ipaddress {
        10.119.76.69/22
    }
    track_script { chk_haproxy }
}
