services:
  app:
    image: ghcr.io/patrikthedev/bi-vdc-semestral:sha-282d29c
    container_name: app
    hostname: ${NODE_FQDN}
    restart: unless-stopped
    ports:
      - "8081:3000"
    environment:
      # Writes go through HAProxy on the VIP to the current Patroni leader
      DATABASE_URL: postgres://postgres:supersecret@${VIP_FQDN}:5000/printers?sslmode=require
    healthcheck:
      test:
        ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
