services:
  patroni:
    image: ghcr.io/zalando/spilo-17:4.0-p3
    container_name: patroni
    hostname: ${NODE_FQDN}
    network_mode: host
    restart: unless-stopped
    environment:
      SCOPE: pg-cluster
      PGVERSION: "17"
      ETCD3_HOSTS: "'svobopat-01:2379','svobopat-02:2379','krizvoj4-03:2379'"
      PGPASSWORD_SUPERUSER: ${PG_SUPER_PW}
      PGPASSWORD_REPLICATION: ${PG_REPL_PW}
      PGPASSWORD_ADMIN: ${PG_ADMIN_PW}
      # Patroni's own vars still work for node-specific bits:
      PATRONI_NAME: ${NODE_NAME}
      PATRONI_RESTAPI_CONNECT_ADDRESS: ${NODE_FQDN}:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: ${NODE_FQDN}:5432
      # Spilo expects these paths:
      PGROOT: /home/postgres/pgroot
    volumes:
      - /var/lib/patroni:/home/postgres/pgdata
