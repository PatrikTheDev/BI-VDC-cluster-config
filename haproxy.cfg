global
    maxconn 2000
    log /dev/log local0
    stats socket /var/run/haproxy.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

defaults
    log     global
    mode    tcp
    option  dontlognull
    timeout connect 5s
    timeout client  30m
    timeout server  30m
    timeout check   5s

resolvers mydns
    nameserver dns1 10.124.0.16:53
    nameserver dns2 10.124.0.17:53
    resolve_retries       3
    timeout resolve       1s
    timeout retry         1s
    hold other           30s
    hold refused         30s
    hold nx              30s
    hold timeout         30s
    hold valid           10s
    hold obsolete        30s

# ─── Stats UI ──────────────────────────────
listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /
    stats refresh 5s
    stats admin if TRUE

# ─── Postgres writes → current Patroni leader ───────────────────
listen postgres-write
    bind *:5000
    option httpchk GET /leader
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions resolvers mydns init-addr last,libc,none
    server node1 node1.example.com:5432 check port 8008
    server node2 node2.example.com:5432 check port 8008
    server node3 node3.example.com:5432 check port 8008

# ─── Postgres reads → healthy replicas, round-robin ─────────────
listen postgres-read
    bind *:5001
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 resolvers mydns init-addr last,libc,none
    server svobopat-01 svobopat-01:5432 check port 8008
    server svobopat-02 svobopat-02:5432 check port 8008
    server krizvoj4-03 krizvoj4-03:5432 check port 8008

# ─── Web app ────────────────────────────────────────────────────
frontend web_front
    bind *:80
    mode http
    option httplog
    default_backend web_back

backend web_back
    mode http
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 resolvers mydns init-addr last,libc,none
    server svobopat-01 svobopat-01:8080 check
    server svobopat-02 svobopat-02:8080 check
    server krizvoj4-03 krizvoj4-03:8080 check
